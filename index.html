<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/cardzen_logo_small.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#FFFFFF" />
    <!-- Keep in sync with src/types/MarketingContent.ts -->
    <meta name="description" content="Cardzen - The calm way to maximize rewards. AI-powered credit card recommendations tailored to your spending habits." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cardzen" />
    <link rel="apple-touch-icon" href="/cardzen_logo_small.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Preconnect to API origin for faster first-load TTFB -->
    <link rel="preconnect" href="https://api.cardzen.ai" crossorigin>

    <!-- Open Graph - keep in sync with src/types/MarketingContent.ts -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cardzen" />
    <meta property="og:title" content="Cardzen - The calm way to maximize rewards" />
    <meta property="og:description" content="Cardzen - The calm way to maximize rewards. AI-powered credit card recommendations tailored to your spending habits." />
    <meta property="og:url" content="https://cardzen.ai" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter/X Card - keep in sync with src/types/MarketingContent.ts -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cardzen - The calm way to maximize rewards" />
    <meta name="twitter:description" content="Cardzen - The calm way to maximize rewards. AI-powered credit card recommendations tailored to your spending habits." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cardzen",
      "url": "https://cardzen.ai",
      "description": "Cardzen - The calm way to maximize rewards. AI-powered credit card recommendations tailored to your spending habits.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Cardzen",
      "url": "https://cardzen.ai",
      "logo": "https://cardzen.ai/cardzen_logo_large.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@cardzen.ai",
        "contactType": "customer support"
      }
    }
    </script>

    <title>Cardzen</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
